# Docker/Production configuration
spring.datasource.url=jdbc:postgresql://db:5432/fantasyia
spring.datasource.username=fantasyia
spring.datasource.password=fantasyia
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.thymeleaf.cache=true
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
server.port=8080

# JPA/Hibernate debugging
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.type=INFO
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Actuator configuration for Docker health checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
management.health.db.enabled=true

# Logging configuration
logging.level.com.fantasyia=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN